baseURL = "/"
languageCode = "en-us"
title = "Collection Showcase"
theme = "showcase"

[params]
  description = "FutureGadgetCollections — browse and manage your TCG collection"
  backendURL = "http://localhost:8080"
  version = "dev"

  # Firebase config — nested to match HUGO_PARAMS_FIREBASE_* env var mapping
  [params.firebase.api]
    key = ""
  [params.firebase.auth]
    domain = ""
  [params.firebase.project]
    id = ""
  [params.firebase.storage]
    bucket = ""
  [params.firebase.messaging.sender]
    id = ""
  [params.firebase.app]
    id = ""

  # Allowed emails — maps to HUGO_PARAMS_ALLOWED_EMAILS -> allowed.emails
  [params.allowed]
    emails = ""

  # Static data sources — maps to HUGO_PARAMS_GCS_DATA_BUCKET -> gcs.data.bucket etc.
  [params.gcs.data]
    bucket = "collection-showcase-data"
  [params.github.data]
    repo = "FutureGadgetCollections/collection-showcase-data"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
