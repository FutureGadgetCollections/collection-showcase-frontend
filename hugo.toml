baseURL = "https://futuregadgetcollections.github.io/collection-showcase-frontend/"
languageCode = "en-us"
title = "Collection Showcase"
theme = "showcase"

[params]
  description = "FutureGadgetCollections — browse and manage your TCG collection"
  backendURL = "http://localhost:8080"
  # Firebase config — override via HUGO_PARAMS_FIREBASE_* env vars (see .env.example)
  firebase_api_key            = ""
  firebase_auth_domain        = ""
  firebase_project_id         = ""
  firebase_storage_bucket     = ""
  firebase_messaging_sender_id = ""
  firebase_app_id             = ""

  # Comma-separated list of emails allowed to sign in (mirrors backend ALLOWED_EMAILS)
  allowed_emails   = ""

  # Static data sources (Drive-first, GCS fallback)
  gcs_data_bucket  = "collection-showcase-data"
  drive_folder_id  = "19lv9yCm4zWQHxr0K3DI7jBW3fp18b0li"
  drive_api_key    = ""  # Google API key with Drive API enabled (can reuse Firebase key if Drive API is on)

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
