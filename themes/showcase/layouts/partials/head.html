<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ .Site.Params.description }}">

<!-- Bootstrap 5 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<!-- Custom styles -->
<link rel="stylesheet" href="{{ "css/app.css" | relURL }}">

<!-- Firebase config injected at build time from hugo.toml / HUGO_PARAMS_* env vars -->
<script>
  window.FIREBASE_CONFIG = {
    apiKey:            "{{ .Site.Params.firebase_api_key }}",
    authDomain:        "{{ .Site.Params.firebase_auth_domain }}",
    projectId:         "{{ .Site.Params.firebase_project_id }}",
    storageBucket:     "{{ .Site.Params.firebase_storage_bucket }}",
    messagingSenderId: "{{ .Site.Params.firebase_messaging_sender_id }}",
    appId:             "{{ .Site.Params.firebase_app_id }}",
  };
  window.ALLOWED_EMAILS = {{ .Site.Params.allowed_emails | strings.Split "," | jsonify }};
  window.DATA_CONFIG = {
    gcsBucket:    "{{ .Site.Params.gcs_data_bucket }}",
    driveFolderId: "{{ .Site.Params.drive_folder_id }}",
    driveApiKey:  "{{ .Site.Params.drive_api_key }}",
  };
</script>
