{{ define "main" }}
<div class="d-flex align-items-center justify-content-between mb-4">
  <h2 class="h5 mb-0 fw-semibold"><i class="bi bi-box me-2 text-primary"></i>Products</h2>
  <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#itemModal" onclick="openCreateModal()">
    <i class="bi bi-plus-lg me-1"></i>Add Product
  </button>
</div>

<div id="auth-guard" class="alert alert-warning d-none">
  <i class="bi bi-lock me-1"></i>You must be <a href="{{ "" | relURL }}">signed in</a> to manage products.
</div>
<div id="loading" class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>
<div id="empty-state" class="text-center py-5 d-none">
  <i class="bi bi-inbox fs-1 text-muted"></i>
  <p class="text-muted mt-2">No products yet. Add your first one!</p>
</div>

<div class="card shadow-sm border-0 d-none" id="items-card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-3">Name</th>
            <th>Game / Category</th>
            <th>Added</th>
            <th class="text-end pe-3">Actions</th>
          </tr>
        </thead>
        <tbody id="items-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Create / Edit Modal -->
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title" id="modal-title">Add Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="item-id">
        <div class="mb-3">
          <label class="form-label small fw-medium" for="item-name">Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="item-name" placeholder="e.g. Black Lotus">
        </div>
        <div class="mb-3">
          <label class="form-label small fw-medium" for="item-game">Game / Category</label>
          <input type="text" class="form-control" id="item-game" placeholder="e.g. Magic: The Gathering">
        </div>
        <div id="modal-error" class="alert alert-danger py-2 small d-none"></div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary btn-sm" id="modal-save-btn" onclick="saveItem()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirm -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content border-0 shadow">
      <div class="modal-body text-center pt-4">
        <i class="bi bi-trash3 fs-2 text-danger"></i>
        <p class="mt-2 mb-1 fw-medium">Delete this product?</p>
        <p class="text-muted small">All related transactions and price history will also be removed.</p>
      </div>
      <div class="modal-footer border-0 justify-content-center pt-0 pb-3">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirm-delete-btn">Delete</button>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "page-scripts" }}
<script>
  const itemModal   = new bootstrap.Modal(document.getElementById('itemModal'));
  const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));

  firebase.auth().onAuthStateChanged(async user => {
    if (!user) {
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('auth-guard').classList.remove('d-none');
      return;
    }
    await loadItems();
  });

  async function loadItems() {
    try {
      const items = await api('GET', '/products');
      document.getElementById('loading').classList.add('d-none');
      if (!items || items.length === 0) {
        document.getElementById('empty-state').classList.remove('d-none');
        return;
      }
      renderItems(items);
    } catch (e) {
      document.getElementById('loading').classList.add('d-none');
      showToast('Failed to load products: ' + e.message, 'danger');
    }
  }

  function renderItems(items) {
    document.getElementById('items-card').classList.remove('d-none');
    document.getElementById('empty-state').classList.add('d-none');
    document.getElementById('items-tbody').innerHTML = items.map(p => `
      <tr>
        <td class="ps-3 fw-medium">${escHtml(p.name)}</td>
        <td class="text-muted">${escHtml(p.game_category || '—')}</td>
        <td class="text-muted small">${fmtDate(p.created_at)}</td>
        <td class="text-end pe-3">
          <button class="btn btn-sm btn-outline-secondary me-1" onclick='openEditModal(${JSON.stringify(p)})'>
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal('${p.product_id}')">
            <i class="bi bi-trash3"></i>
          </button>
        </td>
      </tr>
    `).join('');
  }

  function openCreateModal() {
    document.getElementById('modal-title').textContent = 'Add Product';
    document.getElementById('item-id').value = '';
    document.getElementById('item-name').value = '';
    document.getElementById('item-game').value = '';
    document.getElementById('modal-error').classList.add('d-none');
  }

  function openEditModal(item) {
    document.getElementById('modal-title').textContent = 'Edit Product';
    document.getElementById('item-id').value = item.product_id;
    document.getElementById('item-name').value = item.name;
    document.getElementById('item-game').value = item.game_category || '';
    document.getElementById('modal-error').classList.add('d-none');
    itemModal.show();
  }

  async function saveItem() {
    const id   = document.getElementById('item-id').value;
    const name = document.getElementById('item-name').value.trim();
    const game = document.getElementById('item-game').value.trim();
    const errEl = document.getElementById('modal-error');
    errEl.classList.add('d-none');
    if (!name) { errEl.textContent = 'Name is required.'; errEl.classList.remove('d-none'); return; }

    const btn = document.getElementById('modal-save-btn');
    btn.disabled = true;
    try {
      const body = { name, game_category: game };
      if (id) { await api('PUT',  `/products/${id}`, body); }
      else    { await api('POST', '/products', body); }
      itemModal.hide();
      await loadItems();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove('d-none');
    } finally { btn.disabled = false; }
  }

  let pendingDeleteId = null;
  function openDeleteModal(id) { pendingDeleteId = id; deleteModal.show(); }

  document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
    try {
      await api('DELETE', `/products/${pendingDeleteId}`);
      deleteModal.hide();
      await loadItems();
    } catch (e) { showToast('Delete failed: ' + e.message, 'danger'); }
  });

  function escHtml(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(String(s))); return d.innerHTML; }
  function fmtDate(s) { return s ? new Date(s).toLocaleDateString() : '—'; }
</script>
{{ end }}
